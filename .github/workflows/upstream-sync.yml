name: Upstream Sync

on:
  schedule:
    - cron: '0 6 * * *'  # 6 AM UTC daily
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/rtk-ai/rtk.git || true
          git fetch upstream --tags

      - name: Check for new stable release
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh api repos/rtk-ai/rtk/releases/latest --jq .tag_name)
          CURRENT="v$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)"
          echo "Latest upstream stable: ${TAG} — fork main: ${CURRENT}"
          if [ "$TAG" = "$CURRENT" ]; then
            echo "Fork is up to date — nothing to do."
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "tag=$TAG" >> $GITHUB_OUTPUT
          fi

      - name: Create or reset sync branch
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git checkout -B upstream-sync "${{ steps.check.outputs.tag }}"
          # Fork owns .github entirely — drop upstream CI, restore ours
          rm -rf .github
          git checkout origin/main -- .github/
          git add -A .github
          git commit -m "ci: replace upstream CI with fork sync workflow"
          git push origin upstream-sync --force

      - name: Run cargo audit
        if: steps.check.outputs.has_changes == 'true'
        run: |
          rustup update stable
          cargo install cargo-audit --locked
          [ -f Cargo.lock ] || cargo generate-lockfile
          set +e
          cargo audit > /tmp/cargo_audit.txt 2>&1
          echo "cargo audit exit code: $?" >> /tmp/cargo_audit.txt
          set -e
          cat /tmp/cargo_audit.txt

      - name: Generate AI security review
        if: steps.check.outputs.has_changes == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BASE_REF: origin/main
          HEAD_REF: ${{ steps.check.outputs.tag }}
        run: python3 .github/scripts/ai_security_review.py

      - name: Open or update PR
        if: steps.check.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.check.outputs.tag }}"
          COMMITS=$(git log origin/main.."$TAG" --oneline -- . ':!.github' | head -50)
          RELEASE_NOTES=$(gh api repos/rtk-ai/rtk/releases/latest --jq .body | head -60)

          cat > /tmp/pr_body.md << BODYEOF
          ## Upstream Sync — ${TAG}

          **Upstream release notes ([rtk-ai/rtk](https://github.com/rtk-ai/rtk/releases)):**
          ${RELEASE_NOTES}

          **Commits (first 50):**
          \`\`\`
          ${COMMITS}
          \`\`\`

          ---

          ## 🤖 AI Security Review

          $(cat /tmp/ai_review.md)

          ---

          ## 🔒 cargo audit (RustSec)

          \`\`\`
          $(cat /tmp/cargo_audit.txt)
          \`\`\`

          ---

          **After merging, rebuild your local binary:**
          \`\`\`
          cargo install --git https://github.com/AlobarQuest/rtk --branch main --locked --force rtk
          \`\`\`

          *Auto-generated by upstream-sync workflow*
          BODYEOF

          EXISTING=$(gh pr list --repo "${{ github.repository }}" --base main --head upstream-sync --json number --jq '.[0].number' 2>/dev/null)

          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            gh pr edit "$EXISTING" --repo "${{ github.repository }}" \
              --title "⬆️ Upstream sync — ${TAG}" \
              --body-file /tmp/pr_body.md
            echo "Updated existing PR #${EXISTING}"
          else
            gh pr create --repo "${{ github.repository }}" \
              --base main \
              --head upstream-sync \
              --title "⬆️ Upstream sync — ${TAG}" \
              --body-file /tmp/pr_body.md
          fi
